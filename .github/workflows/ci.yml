name: ci

# PR + main gate (aviation-grade). Fork PRs run on GitHub-hosted runners without
# Production deploy runs ONLY on a pushed version tag (v*), NEVER on a bare merge
# to main. Cut a SemVer tag to ship: git tag -a v0.1.0 -m "..." && git push origin v0.1.0.
# GitHub-hosted runners (public repo; org fleet pool does not accept public-repo
# jobs). Config materialized from GitHub secrets.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-search-mcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'skyphusion-labs/search-mcp'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert tag is on main (no prod deploy from an unmerged branch)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::tag $GITHUB_REF_NAME points at $GITHUB_SHA which is not on origin/main; refusing to deploy an unreviewed commit"
            exit 1
          fi
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - run: npm ci
      - name: Materialize production config
        env:
          SKYPHUSION_WRANGLER_TOML: ${{ secrets.SKYPHUSION_WRANGLER_TOML }}
          SKYPHUSION_WRANGLER_MCP_TOML: ${{ secrets.SKYPHUSION_WRANGLER_MCP_TOML }}
          SKYPHUSION_TARGETS_JSON: ${{ secrets.SKYPHUSION_TARGETS_JSON }}
        run: node scripts/materialize-config.mjs
      - name: Deploy public query Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
      - name: Deploy internal MCP Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy:mcp
