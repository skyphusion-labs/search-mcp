name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert commit is on main (no publish of an unreviewed release)
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::commit $GITHUB_SHA is not on origin/main; refusing to publish an unreviewed release"
            exit 1
          fi

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # fc#864: env-indirect the tag (prism publish-npm pattern) — never interpolate
      # maintainer-controlled tag text into the script body.
      - name: Verify package version matches release tag
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          tag_version="${tag#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg" ]; then
            echo "::error::Release tag $tag (version $tag_version) does not match package.json version $pkg" >&2
            exit 1
          fi

      - name: Publish (skip if version already on registry)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          pkg="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          if npm view "${pkg}@${ver}" version >/dev/null 2>&1; then
            echo "Skip: ${pkg}@${ver} already published"
            exit 0
          fi
          npm publish --provenance --access public
