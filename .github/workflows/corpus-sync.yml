name: corpus-sync

# Merge-driven resync of the Cloudflare AI Search corpus. Production plumbing, NOT a CI
# gate: never add it to required status checks.
#
# Triggers:
#   - repository_dispatch (corpus-sync): a constellation repo merged to main.
#   - schedule: daily safety net for dropped or failed dispatches.
#   - workflow_dispatch: manual re-run.
#
# Config (wrangler.toml, wrangler.mcp.toml, scripts/targets.json) is materialized from
# Public repo -> GitHub-hosted runners (fleet pool rejects public-repo jobs).
# CORPUS_ROOT defaults to ${{ github.workspace }}/.corpus; actions/cache restores it between
# runs so sync-runner fetch-es instead of full-cloning. Fleet runners mount /opt/corpus when
# a job sets CORPUS_ROOT=/opt/corpus (see fleet-chezmoi gha-dispatcher).

on:
  repository_dispatch:
    types: [corpus-sync]
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: corpus-sync
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'skyphusion-labs/search-mcp'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - run: npm ci
      - name: Materialize production config
        env:
          SKYPHUSION_WRANGLER_TOML: ${{ secrets.SKYPHUSION_WRANGLER_TOML }}
          SKYPHUSION_WRANGLER_MCP_TOML: ${{ secrets.SKYPHUSION_WRANGLER_MCP_TOML }}
          SKYPHUSION_TARGETS_JSON: ${{ secrets.SKYPHUSION_TARGETS_JSON }}
        run: node scripts/materialize-config.mjs
      - name: Restore corpus clone cache
        uses: actions/cache@v4
        with:
          path: .corpus
          key: corpus-${{ runner.os }}-${{ hashFiles('scripts/targets.json') }}
          restore-keys: |
            corpus-${{ runner.os }}-
      - name: Sync corpus and reindex
        env:
          CORPUS_ROOT: ${{ vars.CORPUS_ROOT || format('{0}/.corpus', github.workspace) }}
          CORPUS_GIT_ORG: skyphusion-labs
          GITHUB_TOKEN: ${{ secrets.CORPUS_READ_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/sync-runner.mjs
